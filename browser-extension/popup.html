<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Orange Downloader</title>
    <style>
      body {
        width: 280px;
        margin: 0;
        padding: 14px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 8px;
      }
      p {
        font-size: 12px;
        line-height: 1.45;
        color: #94a3b8;
        margin: 0 0 12px;
        word-break: break-all;
      }
      .platform {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 3px 8px;
        margin: 0 0 10px;
        color: #fdba74;
        background: rgba(249, 115, 22, 0.12);
        border: 1px solid rgba(249, 115, 22, 0.25);
        font-size: 11px;
        font-weight: 600;
      }
      .actions {
        display: grid;
        gap: 8px;
      }
      button {
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        color: white;
        background: #f97316;
        font-weight: 600;
        cursor: pointer;
      }
      button.secondary {
        color: #fdba74;
        background: rgba(249, 115, 22, 0.12);
        border: 1px solid rgba(249, 115, 22, 0.25);
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <h1>Send to Orange</h1>
    <div id="platform" class="platform">Detecting platform...</div>
    <p id="url">Reading current tab...</p>
    <div class="actions">
      <button id="import" disabled>Open & Start</button>
      <button id="send" class="secondary" disabled>Open Downloader</button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
