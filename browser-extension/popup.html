<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Orange Downloader</title>
    <style>
      body {
        width: 280px;
        margin: 0;
        padding: 14px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 8px;
      }
      p {
        font-size: 12px;
        line-height: 1.45;
        color: #94a3b8;
        margin: 0 0 12px;
        word-break: break-all;
      }
      button {
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        color: white;
        background: #f97316;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <h1>Send to Orange</h1>
    <p id="url">Reading current tab...</p>
    <button id="send" disabled>Open Downloader</button>
    <script src="popup.js"></script>
  </body>
</html>
