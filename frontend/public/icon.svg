<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FF8C42"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Orange fruit -->
  <circle cx="256" cy="240" r="120" fill="#FFB74D"/>
  <circle cx="256" cy="240" r="120" fill="none" stroke="#F57C00" stroke-width="6"/>
  <!-- Leaf -->
  <ellipse cx="256" cy="130" rx="30" ry="50" fill="#4CAF50" transform="rotate(-15, 256, 130)"/>
  <line x1="256" y1="130" x2="256" y2="170" stroke="#388E3C" stroke-width="3"/>
  <!-- Highlight -->
  <ellipse cx="220" cy="210" rx="30" ry="20" fill="rgba(255,255,255,0.3)"/>
  <!-- Download arrow -->
  <g transform="translate(256,380)">
    <rect x="-60" y="-80" width="120" height="8" rx="4" fill="white"/>
    <polygon points="0,50 -30,10 30,10" fill="white"/>
    <rect x="-6" y="-70" width="12" height="60" rx="6" fill="white"/>
  </g>
</svg>
