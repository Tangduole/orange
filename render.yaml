services:
  - type: web
    name: orange-backend
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile.railway
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TIKHUB_API_KEY_DOUYIN
        sync: false
      - key: TIKHUB_API_KEY_TIKTOK
        sync: false
      - key: TIKHUB_API_KEY_YOUTUBE
        sync: false
      - key: TIKHUB_API_KEY_X
        sync: false
