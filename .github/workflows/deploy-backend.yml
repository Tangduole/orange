name: Deploy Backend to Vultr

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - 'ecosystem.config.js'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vultr via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: root
          key: ${{ secrets.VULTR_SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e
            bash /opt/orange/backend/backend/scripts/deploy.sh
