name: Deploy Backend to Vultr

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - 'ecosystem.config.js'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vultr via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: root
          key: ${{ secrets.VULTR_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /opt/orange/backend
            git pull origin master
            npm install --production
            pm2 restart orange-backend || pm2 start ecosystem.config.js
            pm2 save
            pm2 logs orange-backend --lines 5 --nostream
