name: Deploy Backend to Vultr

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - 'ecosystem.config.js'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vultr via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: root
          key: ${{ secrets.VULTR_SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e
            cd /root/orange-backend
            git pull origin master
            cd backend
            npm install --no-audit --no-fund
            node --check src/app.js
            node --check src/controllers/download.js
            pm2 restart orange-backend --update-env || pm2 start ecosystem.config.js --update-env
            pm2 save
            sleep 5
            pm2 logs orange-backend --lines 20 --nostream
            curl -fsS http://127.0.0.1:3000/health
