name: Android APK

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Debug
        run: |
          echo "Node version: $(node -v)"
          echo "NPM version: $(npm -v)"
          echo "Java version: $(java -version 2>&1 | head -1)"
          echo "Current dir: $(pwd)"
          echo "Contents: $(ls -la)"
          
      - name: Build
        run: |
          cd frontend
          echo "=== NPM Install ==="
          npm install
          echo "=== NPM Build ==="
          npm run build
          echo "=== Dist contents ==="
          ls -la dist/
          echo "=== Cap Sync ==="
          npx cap sync android
          echo "=== Android dir ==="
          ls -la android/
          echo "=== Gradle Build ==="
          cd android
          ./gradlew assembleDebug --info
